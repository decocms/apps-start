name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm test

      - name: Lint (verbose)
        run: |
          echo "=== file count probe ==="
          find commerce shopify vtex resend website -type f \( -name "*.ts" -o -name "*.tsx" \) | wc -l
          echo "=== untracked/modified probe ==="
          git status -s
          echo "=== biome ==="
          npx biome check --max-diagnostics=300 .

      - run: npm run typecheck
