name: Release

# GOTCHA: GitHub Actions silently skips this workflow when the head
# commit message contains the canonical CI-skip token (the bracketed
# phrase "skip" + "ci") ANYWHERE in the message — title or body,
# inside backticks, inside code blocks, doesn't matter. Past releases
# of @semantic-release/git emitted that token by design (so the
# auto-bump commit didn't loop a release back through CI); even
# though we no longer run that plugin, the token can still appear
# in PR bodies that quote past release commits and inherit it
# through a squash-merge.
#
# When writing a commit message or PR body that needs to reference
# the suppression behaviour, refer to it descriptively (e.g. "the
# semantic-release skip token") instead of pasting the literal.
#
# Recover with a no-op commit whose entire message — title and body
# — does NOT contain the literal token.
#
# References:
#  - https://docs.github.com/en/actions/managing-workflow-runs/skipping-workflow-runs

on:
  push:
    branches: [main, next]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm test

      # Debug step: dump the OIDC token's public claims so we can compare
      # them to the values stored in npm's Trusted Publisher config when
      # a publish 404s after a successful provenance signing. Token is
      # fetched for the `npm:registry.npmjs.org` audience (the same one
      # npm publish uses) and only the decoded JSON header + payload are
      # printed — never the signature. Safe to log because the JWT
      # signature is what makes the token usable; the claims alone are
      # not credentials.
      - name: Debug — print OIDC claims for npm audience
        run: |
          TOKEN=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" \
            | jq -r .value)
          echo "--- OIDC token claims (audience: npm:registry.npmjs.org) ---"
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq .
          echo "--- end claims ---"

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
