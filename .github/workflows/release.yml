name: Release

# GOTCHA: GitHub Actions silently skips this workflow when the head
# commit message contains the canonical CI-skip token (the bracketed
# phrase "skip" + "ci") ANYWHERE in the message — title or body,
# inside backticks, inside code blocks, doesn't matter. Past releases
# of @semantic-release/git emitted that token by design (so the
# auto-bump commit didn't loop a release back through CI); even
# though we no longer run that plugin, the token can still appear
# in PR bodies that quote past release commits and inherit it
# through a squash-merge.
#
# When writing a commit message or PR body that needs to reference
# the suppression behaviour, refer to it descriptively (e.g. "the
# semantic-release skip token") instead of pasting the literal.
#
# Recover with a no-op commit whose entire message — title and body
# — does NOT contain the literal token.
#
# References:
#  - https://docs.github.com/en/actions/managing-workflow-runs/skipping-workflow-runs

on:
  push:
    branches: [main, next]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Node 24 ships with npm 11.x, required for the OIDC handshake the npm
      # registry expects since ~May 2026. Node 22 still ships with npm 10,
      # whose handshake the registry has deprecated — see npm/cli#8976,
      # npm/cli#8730, and the "Node 24 fix" writeup at
      # https://medium.com/@kenricktan11/npm-trusted-publishers-the-weird-404-error-and-the-node-js-24-fix-a9f1d717a5dd
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm test

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
