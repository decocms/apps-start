name: Release

# GOTCHA: GitHub Actions silently skips this workflow when the head
# commit message contains the canonical CI-skip token (the bracketed
# phrase "skip" + "ci") ANYWHERE in the message — title or body,
# inside backticks, inside code blocks, doesn't matter. Past releases
# of @semantic-release/git emitted that token by design (so the
# auto-bump commit didn't loop a release back through CI); even
# though we no longer run that plugin, the token can still appear
# in PR bodies that quote past release commits and inherit it
# through a squash-merge.
#
# When writing a commit message or PR body that needs to reference
# the suppression behaviour, refer to it descriptively (e.g. "the
# semantic-release skip token") instead of pasting the literal.
#
# Recover with a no-op commit whose entire message — title and body
# — does NOT contain the literal token.
#
# References:
#  - https://docs.github.com/en/actions/managing-workflow-runs/skipping-workflow-runs

on:
  push:
    branches: [main, next]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npm test

      # Debug step: replicate the OIDC->npm exchange manually so we can
      # see the actual error body npm returns at each step. The npm CLI
      # hides response bodies even at --loglevel=silly. With this we get:
      #   1. the OIDC token claims (already verified to match TP UI)
      #   2. the response from npm's token-exchange endpoint, which is
      #      what npm CLI does internally before the PUT to publish
      #   3. the same exchange against @decocms/start (known working)
      #      to compare
      # Only the JWT's public header + payload claims and npm's
      # response bodies are echoed; the signature is never logged.
      - name: Debug — replicate OIDC token exchange and dump npm responses
        run: |
          set +e
          OIDC_TOKEN=$(curl -sSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" \
            | jq -r .value)

          echo "=== STEP 1: OIDC token claims ==="
          echo "$OIDC_TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq .

          echo ""
          echo "=== STEP 2: POST /-/npm/v1/oidc/token/exchange for @decocms/apps (failing) ==="
          curl -sSL -w "\nHTTP_STATUS=%{http_code}\n" \
            -X POST "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/%40decocms%2Fapps" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}'

          echo ""
          echo "=== STEP 3: extract bearer from exchange and probe with it ==="
          EXCHANGE_RESP=$(curl -sSL \
            -X POST "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/%40decocms%2Fapps" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{}')
          NPM_BEARER=$(echo "$EXCHANGE_RESP" | jq -r .token)
          NPM_BEARER_TYPE=$(echo "$EXCHANGE_RESP" | jq -r .token_type)
          echo "Got bearer (type=$NPM_BEARER_TYPE, length=${#NPM_BEARER})"

          echo ""
          echo "=== STEP 4: whoami with the bearer ==="
          curl -sSL -w "\nHTTP_STATUS=%{http_code}\n" \
            "https://registry.npmjs.org/-/whoami" \
            -H "Authorization: Bearer $NPM_BEARER"

          echo ""
          echo "=== STEP 5: GET the package metadata with the bearer ==="
          curl -sSL -w "\nHTTP_STATUS=%{http_code}\n" -o /dev/null \
            "https://registry.npmjs.org/@decocms/apps" \
            -H "Authorization: Bearer $NPM_BEARER"

          echo ""
          echo "=== STEP 6: HEAD the publish endpoint with the bearer ==="
          curl -sSL -w "\nHTTP_STATUS=%{http_code}\n" -I \
            "https://registry.npmjs.org/@decocms%2fapps" \
            -H "Authorization: Bearer $NPM_BEARER"

          echo ""
          echo "=== STEP 7: PUT a minimal probe doc with the bearer (full response body) ==="
          PROBE_BODY='{"_id":"@decocms/apps","name":"@decocms/apps","versions":{"99.99.99-probe":{"name":"@decocms/apps","version":"99.99.99-probe","_id":"@decocms/apps@99.99.99-probe","dist":{"tarball":"https://registry.npmjs.org/@decocms/apps/-/apps-99.99.99-probe.tgz","shasum":"0000000000000000000000000000000000000000"}}},"_attachments":{}}'
          curl -sSL -w "\nHTTP_STATUS=%{http_code}\n" \
            -X PUT "https://registry.npmjs.org/@decocms%2fapps" \
            -H "Authorization: Bearer $NPM_BEARER" \
            -H "Content-Type: application/json" \
            -d "$PROBE_BODY"
          echo ""
          echo "--- end exchange diagnostics ---"

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
